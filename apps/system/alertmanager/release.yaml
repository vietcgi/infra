apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  chart:
    spec:
      chart: alertmanager
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      version: 1.6.0
  interval: 5m
  values:
    config:
      global:
        resolve_timeout: 5m
      receivers:
      - name: 'null'
      route:
        group_by:
        - alertname
        group_interval: 5m
        group_wait: 10s
        receiver: 'null'
        repeat_interval: 3h
