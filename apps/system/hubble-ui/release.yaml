apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: hubble-ui
  namespace: kube-system
spec:
  chart:
    spec:
      chart: hubble-ui
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: monitoring
      version: 0.11.0
  interval: 5m
  values:
    hubble:
      relay:
        enabled: true
      ui:
        enabled: true
