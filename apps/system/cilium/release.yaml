apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  chart:
    spec:
      chart: cilium
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: monitoring
      version: 1.14.3
  install:
    createNamespace: false
    remediation:
      retries: 0
  interval: 10m
  upgrade:
    remediation:
      retries: 0
  values:
    enabled: false
