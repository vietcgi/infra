apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-system-apps
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  project: default
  source:
    repoURL: https://github.com/vietcgi/infra
    targetRevision: HEAD
    path: apps/system
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
